spring:
  application:
    name: booking-system

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Pass@123}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics

    endpoint:
      health:
        probes:
          enabled: true
        show-details: always